<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Challenge of the Day - Energetic Variant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div class="brand-mark" aria-hidden="true">
        <span></span>
        <span></span>
      </div>

      <p class="eyebrow">Programming Paradigms</p>
      <h1>Challenge of the Day</h1>
      <p class="subtitle">
        One quick challenge. One sharp idea. No passive scrolling, tragically.
      </p>
    </section>

    <section class="student-card">
      <div class="section-heading">
        <span class="step-badge">1</span>
        <div>
          <h2>Choose your name</h2>
          <p>Start typing and select yourself from the list.</p>
        </div>
      </div>

      <label for="student-input">Student name</label>
      <input id="student-input" type="text" autocomplete="off" placeholder="Start typing your name...">
      <ul id="student-suggestions" class="suggestions"></ul>
      <p id="student-status" class="hint"></p>
    </section>

    <section id="challenge" class="challenge-card"></section>

    <section class="answer-card">
      <div class="section-heading">
        <span class="step-badge">3</span>
        <div>
          <h2>Your answer</h2>
          <p>Choose, explain, and make your reasoning visible.</p>
        </div>
      </div>

      <form id="response-form"></form>
      <button id="submit-button" type="button">Submit challenge</button>
    </section>

    <section id="feedback" class="feedback-card hidden"></section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
